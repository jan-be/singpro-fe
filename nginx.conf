# Detect search engine bots by User-Agent
map $http_user_agent $is_bot {
    default                     "";
    ~*googlebot                 1;
    ~*bingbot                   1;
    ~*slurp                     1;
    ~*duckduckbot               1;
    ~*baiduspider               1;
    ~*yandexbot                 1;
    ~*facebot                   1;
    ~*facebookexternalhit       1;
    ~*twitterbot                1;
    ~*linkedinbot               1;
    ~*whatsapp                  1;
    ~*telegrambot               1;
    ~*discordbot                1;
    ~*applebot                  1;
    ~*semrushbot                1;
    ~*ahrefsbot                 1;
    ~*mj12bot                   1;
    ~*dotbot                    1;
    ~*rogerbot                  1;
    ~*embedly                   1;
    ~*quora\ link\ preview      1;
    ~*showyoubot                1;
    ~*outbrain                  1;
    ~*pinterest                 1;
    ~*slackbot                  1;
    ~*vkshare                   1;
    ~*w3c_validator             1;
    ~*petalbot                  1;
    ~*gptbot                    1;
    ~*claudebot                 1;
    ~*bytespider                1;
}

# Map request URI to a prerendered file path (if it matches our URL patterns)
# Song page: /{lang}/sing/{slug}/{songId} → /{lang}/sing/{slug}/{songId}.html
# Home page: /{lang} or /{lang}/ → /{lang}/index.html
map $uri $prerendered_file {
    default                                                     "";
    ~^/(?<lang>[a-z]{2}(?:-[A-Z]{2})?)/sing/(?<slug>[^/]+)/(?<sid>[^/]+)/?$   /$lang/sing/$slug/$sid.html;
    ~^/(?<lang>[a-z]{2}(?:-[A-Z]{2})?)/?$                                      /$lang/index.html;
}

server {
    listen 80;

    # --- SEO files: always served directly ---
    location = /sitemap-index.xml {
        alias /prerendered/sitemap-index.xml;
    }

    location ~ ^/(sitemap-.*\.xml)$ {
        alias /prerendered/$1;
    }

    location = /robots.txt {
        alias /prerendered/robots.txt;
    }

    # --- Main location ---
    location / {
        root /files;
        index index.html;

        # If this is a bot AND we have a prerendered file, serve it
        # $is_bot is "1" for bots, "" otherwise
        # $prerendered_file is the path or "" if no match
        set $serve_prerendered "";
        if ($is_bot) {
            set $serve_prerendered $prerendered_file;
        }

        # Serve prerendered HTML for bots
        if ($serve_prerendered) {
            rewrite ^ $serve_prerendered break;
            root /prerendered;
        }

        # Normal SPA fallback for users
        set $fallback_file /index.html;
        if ($http_accept !~ text/html) {
            set $fallback_file /null;
        }
        if ($uri ~ /$) {
            set $fallback_file /null;
        }
        try_files $uri $fallback_file;
    }
}
