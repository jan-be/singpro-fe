# Detect search engine bots by User-Agent
map $http_user_agent $is_bot {
    default                     0;
    ~*googlebot                 1;
    ~*bingbot                   1;
    ~*slurp                     1;
    ~*duckduckbot               1;
    ~*baiduspider               1;
    ~*yandexbot                 1;
    ~*facebot                   1;
    ~*facebookexternalhit       1;
    ~*twitterbot                1;
    ~*linkedinbot               1;
    ~*whatsapp                  1;
    ~*telegrambot               1;
    ~*discordbot                1;
    ~*applebot                  1;
    ~*semrushbot                1;
    ~*ahrefsbot                 1;
    ~*mj12bot                   1;
    ~*dotbot                    1;
    ~*rogerbot                  1;
    ~*embedly                   1;
    ~*showyoubot                1;
    ~*outbrain                  1;
    ~*pinterest                 1;
    ~*slackbot                  1;
    ~*vkshare                   1;
    ~*w3c_validator             1;
    ~*petalbot                  1;
    ~*gptbot                    1;
    ~*claudebot                 1;
    ~*bytespider                1;
}

server {
    listen 80;

    # --- /en/... → redirect to /... (English has no prefix) ---
    location ~ ^/en(/.*)?$ {
        return 301 $1$is_args$args;
    }

    # --- SEO: sitemap + robots (always served) ---
    location = /sitemap-index.xml {
        alias /prerendered/sitemap-index.xml;
    }

    location = /robots.txt {
        alias /prerendered/robots.txt;
    }

    location ~ ^/sitemap- {
        root /prerendered;
        try_files $uri =404;
    }

    # --- Bot prerendering for non-English song pages ---
    # /{lang}/sing/{songId}
    # Prerendered: /prerendered/{lang}/sing/{songId}.html
    location ~ "^/[a-z]{2}(-[A-Z]{2})?/sing/" {
        if ($is_bot) {
            rewrite ^(.*)$ /prerendered$1.html last;
        }

        root /files;
        try_files /index.html =404;
    }

    # --- Bot prerendering for English song pages ---
    # /sing/{songId}
    # Prerendered: /prerendered/en/sing/{songId}.html
    location ~ ^/sing/ {
        if ($is_bot) {
            rewrite ^(.*)$ /prerendered/en$1.html last;
        }

        root /files;
        try_files /index.html =404;
    }

    # --- Bot prerendering for non-English home pages ---
    # /{lang} or /{lang}/
    location ~ "^/[a-z]{2}(-[A-Z]{2})?/?$" {
        if ($is_bot) {
            rewrite ^(/[^/]+)/?$ /prerendered$1/index.html last;
        }

        root /files;
        try_files /index.html =404;
    }

    # --- Internal: serve prerendered files (reached via rewrite) ---
    location /prerendered/ {
        internal;
        root /;
        try_files $uri =404;
    }

    # --- Default: serve SPA for all other paths ---
    # English home page bot prerendering is handled here via try_files
    location / {
        root /files;
        index index.html;

        # For bots hitting the home page (/), serve prerendered English
        if ($is_bot) {
            rewrite ^/$ /prerendered/en/index.html last;
        }

        set $fallback_file /index.html;
        if ($http_accept !~ text/html) {
            set $fallback_file /null;
        }
        if ($uri ~ /$) {
            set $fallback_file /null;
        }
        try_files $uri $fallback_file;
    }
}
