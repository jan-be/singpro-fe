<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d070ff"/>
      <stop offset="100%" stop-color="#b44aff"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b44aff"/>
      <stop offset="50%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#39ff14"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Microphone body (rounded rect, tilted ~15°) -->
  <g transform="translate(196, 120)">
    <rect x="0" y="0" width="64" height="140" rx="32" fill="url(#mic)"/>
    <!-- Mic grille lines -->
    <line x1="14" y1="32" x2="50" y2="32" stroke="#1a1a2e" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round"/>
    <line x1="14" y1="46" x2="50" y2="46" stroke="#1a1a2e" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round"/>
    <line x1="14" y1="60" x2="50" y2="60" stroke="#1a1a2e" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round"/>
    <line x1="14" y1="74" x2="50" y2="74" stroke="#1a1a2e" stroke-width="3" stroke-opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- Mic cradle arc -->
  <path d="M176 220 Q176 310 228 310 Q280 310 280 220"
        fill="none" stroke="url(#mic)" stroke-width="14" stroke-linecap="round"/>

  <!-- Mic stand -->
  <line x1="228" y1="310" x2="228" y2="370" stroke="url(#mic)" stroke-width="14" stroke-linecap="round"/>
  <!-- Mic base -->
  <line x1="192" y1="370" x2="264" y2="370" stroke="url(#mic)" stroke-width="14" stroke-linecap="round"/>

  <!-- Pitch wave / sound wave (the scoring curve) -->
  <path d="M280 180 Q300 130 320 180 Q340 230 360 160 Q380 90 400 150 Q420 210 440 140"
        fill="none" stroke="url(#wave)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small dots on wave peaks for "note" feel -->
  <circle cx="320" cy="180" r="6" fill="#00e5ff"/>
  <circle cx="360" cy="160" r="6" fill="#00e5ff"/>
  <circle cx="400" cy="150" r="6" fill="#39ff14"/>
  <circle cx="440" cy="140" r="6" fill="#39ff14"/>
</svg>
